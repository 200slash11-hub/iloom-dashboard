// ── SVG 그리기 ──
const tt = document.getElementById('tt');
function showTT(e,html) {
  tt.innerHTML = html; tt.style.display='block';
  const r = e.target.getBoundingClientRect();
  tt.style.left = r.left + 'px'; tt.style.top = (r.top - 70) + 'px';
}
function hideTT() { tt.style.display='none'; }

function draw(cid, fid, newtData, compData) {
  let filter = 'all';
  const M = {top:30,right:20,bottom:56,left:66};

  function matchFilter(t) {
    if (filter==='all') return true;
    if (filter==='motion') return t==='motion';
    if (filter==='motionset') return t==='motionset';
    if (filter==='normal') return t==='normal';
    if (filter==='set') return t==='set';
    return true;
  }

  function render() {
    const el = document.getElementById(cid);
    const fNewt = newtData.filter(d => matchFilter(d.t));
    const fComp = compData.map(c => {
      const fi = c.items.filter(i => matchFilter(i.t));
      return {...c, items: fi};
    }).filter(c => c.items.length > 0);

    if (!fNewt.length && !fComp.length) { el.innerHTML='<p style="color:#aaa;padding:16px">해당 제품이 없습니다</p>'; return; }

    const allPrices = [...fNewt.map(d=>d.p), ...fComp.flatMap(c=>c.items.map(i=>i.p))];
    const yMax = Math.ceil(Math.max(...allPrices) / 100000) * 100000 + 50000;

    const NEWT_W = Math.max(200, fNewt.length * 16 + 40);
    const COMP_W = fComp.length * 70;
    const GAP = 30;
    const totalW = M.left + NEWT_W + GAP + COMP_W + M.right;
    const H = 540;
    const chartH = H - M.top - M.bottom;

    const yS = p => M.top + chartH - (p / yMax * chartH);

    let s = `<svg width="${totalW}" height="${H}" style="display:block">`;

    // Y축 가격 가이드
    for (let p = 0; p <= yMax; p += 100000) {
      const y = yS(p);
      s += `<line x1="${M.left}" y1="${y}" x2="${totalW - M.right}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
      s += `<text x="${M.left-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#999">${p/10000}만</text>`;
    }

    // ── 일룸 뉴트 영역 ──
    const nx0 = M.left;
    const nx1 = M.left + NEWT_W;
    s += `<rect x="${nx0}" y="${M.top}" width="${NEWT_W}" height="${chartH}" fill="#FFF7ED" rx="6"/>`;
    s += `<text x="${nx0 + NEWT_W/2}" y="${H - M.bottom + 16}" text-anchor="middle" font-size="13" font-weight="700" fill="#FF6B35">일룸 뉴트</text>`;
    s += `<text x="${nx0 + NEWT_W/2}" y="${H - M.bottom + 30}" text-anchor="middle" font-size="10" fill="#aaa">${fNewt.length}개 제품</text>`;

    // 뉴트 점 배치 (가격순 정렬 후 좌→우)
    const sorted = [...fNewt].sort((a,b) => a.p - b.p);
    const dotGap = Math.min(16, (NEWT_W - 20) / Math.max(sorted.length, 1));
    const startX = nx0 + 10 + (NEWT_W - 20 - dotGap * (sorted.length - 1)) / 2;

    sorted.forEach((d, i) => {
      const cx = startX + i * dotGap;
      const cy = yS(d.p);
      const col = TC[d.t];
      s += `<circle cx="${cx}" cy="${cy}" r="5" fill="${col}" stroke="#fff" stroke-width="1.5" style="cursor:pointer"
        onmouseenter="showTT(event,'<b>뉴트 ${esc(d.n)}</b><br>${TL[d.t]}<br><b>${d.p.toLocaleString()}원</b>')"
        onmouseleave="hideTT()"/>`;
    });

    // ── 타사 레인지 영역 ──
    const compX0 = nx1 + GAP;
    fComp.forEach((c, ci) => {
      const cx = compX0 + ci * 70 + 35;
      const prices = c.items.map(i => i.p);
      const minP = Math.min(...prices);
      const maxP = Math.max(...prices);
      const y1 = yS(maxP);
      const y2 = yS(minP);

      // 레인지 바
      if (prices.length > 1) {
        s += `<line x1="${cx}" y1="${y1}" x2="${cx}" y2="${y2}" stroke="${c.color}33" stroke-width="18" stroke-linecap="round"/>`;
        s += `<line x1="${cx}" y1="${y1}" x2="${cx}" y2="${y2}" stroke="${c.color}" stroke-width="3" stroke-linecap="round"/>`;
      }

      // 개별 점
      c.items.forEach(item => {
        const iy = yS(item.p);
        const col = TC[item.t] || c.color;
        s += `<circle cx="${cx}" cy="${iy}" r="4.5" fill="${col}" stroke="#fff" stroke-width="1.2" style="cursor:pointer"
          onmouseenter="showTT(event,'<b>${esc(c.b)}</b><br>${esc(item.n)} · ${TL[item.t]||''}<br><b>${item.p.toLocaleString()}원</b>')"
          onmouseleave="hideTT()"/>`;
      });

      // 브랜드명
      s += `<text x="${cx}" y="${H - M.bottom + 14}" text-anchor="middle" font-size="10" font-weight="600" fill="${c.color}">${esc(c.b)}</text>`;
      // 가격 범위 텍스트
      const rangeText = prices.length > 1
        ? `${(minP/10000).toFixed(0)}~${(maxP/10000).toFixed(0)}만`
        : `${(minP/10000).toFixed(0)}만`;
      s += `<text x="${cx}" y="${H - M.bottom + 26}" text-anchor="middle" font-size="9" fill="#aaa">${rangeText}</text>`;
    });

    s += '</svg>';
    el.innerHTML = s;
  }

  render();

  document.getElementById(fid).querySelectorAll('.fb').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(fid).querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      filter = btn.dataset.f;
      render();
    });
  });
}

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

draw('c1200','f1200', newt1200, comp1200);
draw('c1400','f1400', newt1400, comp1400);
</script>
